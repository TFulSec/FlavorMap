<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quán ăn | FlavorMap</title>

  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/pages.css" />

  <style>
    .restaurant-banner {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      margin-bottom: 24px;
    }

    .restaurant-banner img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      display: block;
    }

    .banner-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 32px;
      color: #fff;
      background: linear-gradient(
        transparent,
        rgba(0,0,0,.75)
      );
    }

    .banner-overlay h1 {
      margin: 10px 0;
      color: #fff;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      margin-top: 24px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(300px,1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .menu-item {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: .2s;
    }

    .menu-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
    }

    .menu-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #f5f5f5;
    }

    .menu-item__body {
      padding: 16px;
    }

    .menu-item__body h4 {
      margin-bottom: 8px;
    }

    .menu-item__body p {
      color: #666;
      font-size: 14px;
      min-height: 42px;
    }

    .menu-item__footer {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .menu-price {
      font-weight: 700;
      color: #ff6b00;
      font-size: 18px;
    }

    .badge-available {
      color: #16a34a;
      font-size: 14px;
      font-weight: 600;
    }

    .badge-soldout {
      color: #dc2626;
      font-size: 14px;
      font-weight: 600;
    }

    @media (max-width: 992px) {
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .restaurant-banner img {
        height: 280px;
      }
    }
  </style>
</head>

<body>
  <div id="navbar-placeholder"></div>

  <section class="detail-page">
    <div class="container">
      <div id="restaurantContent"></div>
    </div>
  </section>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/components/navbar.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      navbar.render();

      const container = document.getElementById('restaurantContent');
      const slug = utils.getParam('slug');

      if (!slug) {
        window.location.href = 'search.html';
        return;
      }

      container.innerHTML = `
        <div class="empty-state">
          <p>Đang tải thông tin quán...</p>
        </div>
      `;

      try {
        const response = await api.get(
          `/restaurants/${encodeURIComponent(slug)}`
        );

        const restaurant = response.data || response;

        console.log("Restaurant:", restaurant);
        console.log("Menu:", restaurant.menuItems);

        const isOpen =
          restaurant.OpeningTime &&
          restaurant.ClosingTime
            ? utils.isOpen(
                restaurant.OpeningTime,
                restaurant.ClosingTime
              )
            : null;

        const statusBadge =
          isOpen === null
            ? ''
            : `
              <span class="badge badge--${isOpen ? 'open' : 'closed'}">
                ${isOpen ? 'Đang mở' : 'Đã đóng'}
              </span>
            `;

        const featuredBadge = restaurant.IsFeatured
          ? '<span class="badge badge--featured">Nổi bật</span>'
          : '';

        const bannerUrl =
          restaurant.BannerUrl &&
          !restaurant.BannerUrl.includes('placeholder')
            ? `../${restaurant.BannerUrl.replace(/^\//, '')}`
            : 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1600';

        const menuItems = Array.isArray(restaurant.menuItems)
          ? restaurant.menuItems
          : [];

        const menuHtml =
          menuItems.length > 0
            ? `
              <div class="menu-grid">
                ${menuItems
                  .map(item => {
                    const imageUrl =
                      item.ImageUrl &&
                      item.ImageUrl.startsWith('http')
                        ? item.ImageUrl
                        : 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800';

                    return `
                      <div class="menu-item">
                        <img
                          src="${imageUrl}"
                          alt="${item.Name}"
                          loading="lazy"
                        >

                        <div class="menu-item__body">
                          <h4>${item.Name}</h4>

                          <p>
                            ${
                              item.Description ||
                              'Món ăn đặc trưng của quán.'
                            }
                          </p>

                          <div class="menu-item__footer">
                            <span class="menu-price">
                              ${utils.formatPrice(item.Price || 0)}
                            </span>

                            ${
                              item.IsAvailable
                                ? '<span class="badge-available">Đang phục vụ</span>'
                                : '<span class="badge-soldout">Hết hàng</span>'
                            }
                          </div>
                        </div>
                      </div>
                    `;
                  })
                  .join('')}
              </div>
            `
            : `
              <div class="empty-state">
                <p>Chưa có thực đơn.</p>
              </div>
            `;

        container.innerHTML = `
          <div class="breadcrumb">
            <a href="search.html">Khám phá</a>
            <span> › </span>
            <span>${restaurant.Name}</span>
          </div>

          <div class="restaurant-banner">
            <img
              src="${bannerUrl}"
              alt="${restaurant.Name}"
            >

            <div class="banner-overlay">
              <div>
                ${featuredBadge}
                ${statusBadge}
              </div>

              <h1>${restaurant.Name}</h1>

              <p>
                ${restaurant.Category || ''}
                ${restaurant.City ? ' · ' + restaurant.City : ''}
                ${restaurant.District ? ' · ' + restaurant.District : ''}
              </p>
            </div>
          </div>

          <div class="detail-layout">

            <section>

              <div class="page-card">
                <p>
                  ${
                    restaurant.Description ||
                    'Chưa có mô tả.'
                  }
                </p>

                <div
                  class="info-card"
                  style="margin-top:20px"
                >
                  <p>
                    📍
                    ${restaurant.Address || 'Chưa cập nhật'}
                  </p>

                  <p>
                    ⏰
                    ${restaurant.OpeningTime || '--:--'}
                    -
                    ${restaurant.ClosingTime || '--:--'}
                  </p>

                  <p>
                    💰
                    ${utils.formatPriceRange(
                      restaurant.PriceMin || 0,
                      restaurant.PriceMax || 0
                    )}
                  </p>

                  <p>
                    ⭐
                    ${restaurant.Rating || 0}
                  </p>
                </div>
              </div>

              <div
                class="page-card"
                style="margin-top:24px"
              >
                <h3>🍽️ Thực đơn</h3>
                ${menuHtml}
              </div>

            </section>

            <aside class="info-card">
              <h3>Thông tin nhanh</h3>

              <p>
                <strong>Thành phố:</strong>
                ${restaurant.City || 'Không rõ'}
              </p>

              <p>
                <strong>Quận/Huyện:</strong>
                ${restaurant.District || 'Không rõ'}
              </p>

              <p>
                <strong>Khoảng giá:</strong>
                ${utils.formatPriceRange(
                  restaurant.PriceMin || 0,
                  restaurant.PriceMax || 0
                )}
              </p>

              <div class="action-btns">
                <a
                  href="search.html"
                  class="btn btn--outline"
                >
                  Quay lại khám phá
                </a>

                <a
                  href="#"
                  class="btn btn--primary"
                >
                  Thêm vào yêu thích
                </a>
              </div>
            </aside>

          </div>
        `;
      } catch (error) {
        console.error(error);

        container.innerHTML = `
          <div class="empty-state">
            <h3>Không thể tải thông tin quán</h3>
            <p>${error.message || 'Đã xảy ra lỗi.'}</p>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
