<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlavorMap - Đăng ký tài khoản</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:420px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h1{
    color:#007bff;
}

.logo p{
    color:#666;
    font-size:14px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

input:focus{
    outline:none;
    border-color:#007bff;
}

.checkbox{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:15px;
}

.checkbox input{
    width:auto;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

.login-link a{
    text-decoration:none;
    color:#007bff;
}

</style>

</head>
<body>

<div class="container">

<div class="logo">
    <h1>FlavorMap</h1>
    <p>Tạo tài khoản mới</p>
</div>

<form id="registerForm">

    <div class="form-group">
        <label>Họ và tên</label>
        <input type="text" id="fullname" required>
    </div>

    <div class="form-group">
        <label>Tên đăng nhập</label>
        <input type="text" id="username" required>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
    </div>

    <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="password" required>
    </div>

    <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <input type="password" id="confirmPassword" required>
    </div>

    <div class="checkbox">
        <input type="checkbox" id="agree" required>
        <label for="agree">Tôi đồng ý với điều khoản sử dụng</label>
    </div>

    <button type="submit">
        Đăng ký
    </button>

</form>

<div class="login-link">
    Đã có tài khoản?
    <a href="#">Đăng nhập</a>
</div>

</div>

<script>

document.getElementById("registerForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const password =
        document.getElementById("password").value;

    const confirmPassword =
        document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Mật khẩu xác nhận không khớp!");
        return;
    }

    alert("Đăng ký thành công!");
});

</script>

</body>
</html>
